name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions:
  contents: read
jobs:
  contracts-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - run: node --test .github/test/*.test.mjs
      - run: npx hardhat build
      - run: node --test server/test/*.test.mjs
  app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: cd app && npm ci && npm test && npm run build
  app-e2e:
    needs: app-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
      - run: npx playwright install --with-deps chromium
        working-directory: app
      - run: npm run test:e2e
        working-directory: app
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            app/playwright-report
            app/test-results
          if-no-files-found: ignore
  contract-tests:
    name: contract-tests (advisory)
    # Full suite runs against the local Nox off-chain stack (Docker). Best-effort:
    # image pulls can be slow/flaky in CI, so this job does not gate merges.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci
      - name: Run test suite (local Nox Docker stack)
        run: |
          npm test -- \
            "$PWD/test/00-stack.test.ts" \
            "$PWD/test/10-veilguard-flows.test.ts" \
            "$PWD/test/20-audit-isolation.test.ts" \
            "$PWD/test/30-governance.test.ts"
