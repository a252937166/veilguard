name: Production Release Gate

on:
  workflow_dispatch:
    inputs:
      confirm_production:
        description: I confirm this gate, or its verified resume, may execute the remaining real Safe action(s) on Sepolia
        required: true
        type: boolean
        default: false
      resume_run_id:
        description: Optional failed Gate run ID; reuse its verified Approve and safely resume its exact Reject attempt
        required: false
        type: string
        default: ''
      resume_run_attempt:
        description: Artifact attempt number for resume_run_id
        required: false
        type: string
        default: '1'

permissions:
  contents: read
  actions: read

concurrency:
  group: veilguard-production-release-gate
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  VEILGUARD_LIVE_BASE_URL: https://veilguard.axiqo.xyz

jobs:
  confirmation:
    name: Confirm production mutation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require explicit confirmation
        env:
          CONFIRMED: ${{ inputs.confirm_production }}
          RESUME_RUN_ID: ${{ inputs.resume_run_id }}
          RESUME_RUN_ATTEMPT: ${{ inputs.resume_run_attempt }}
        run: |
          node -e "if (process.env.CONFIRMED !== 'true') { console.error('Explicit production confirmation is required.'); process.exit(1); }"
          node -e "if (process.env.RESUME_RUN_ID && !/^\d{6,20}$/.test(process.env.RESUME_RUN_ID)) { console.error('Resume run ID must be numeric.'); process.exit(1); }"
          node -e "if (process.env.RESUME_RUN_ID && !/^\d{1,4}$/.test(process.env.RESUME_RUN_ATTEMPT)) { console.error('Resume run attempt must be numeric.'); process.exit(1); }"

  contract_tests:
    name: Nox contract-tests (release blocking)
    needs: confirmation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run all 17 Nox contract tests
        run: |
          npm test -- \
            "$PWD/test/00-stack.test.ts" \
            "$PWD/test/10-veilguard-flows.test.ts" \
            "$PWD/test/20-audit-isolation.test.ts" \
            "$PWD/test/30-governance.test.ts"

  live_approve:
    name: Live Sepolia · Approve
    needs: contract_tests
    if: ${{ inputs.resume_run_id == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npx playwright install --with-deps chromium
        working-directory: app
      - name: Resolve tested UI SHA
        id: ui
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Execute one real Approve path
        timeout-minutes: 15
        working-directory: app
        env:
          VEILGUARD_LIVE_E2E: '1'
          VEILGUARD_LIVE_ACTION: approve
          VEILGUARD_EXPECTED_UI_SHA: ${{ steps.ui.outputs.sha }}
          VEILGUARD_SOURCE_COMMIT: ${{ github.sha }}
          VEILGUARD_LIVE_EVIDENCE_PATH: release-evidence/approve.json
        run: npx playwright test --project=live-sepolia
      - name: Upload Approve evidence and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-approve-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            app/release-evidence/approve*.json
            app/test-results
            app/playwright-report
          if-no-files-found: warn
          retention-days: 90

  recover_approve:
    name: Recover verified prior Approve
    needs: contract_tests
    if: ${{ inputs.resume_run_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      reject_mode: ${{ steps.resume.outputs.reject_mode }}
      reject_run_id: ${{ steps.resume.outputs.reject_run_id }}
      reject_request_id: ${{ steps.resume.outputs.reject_request_id }}
      reject_request_tx: ${{ steps.resume.outputs.reject_request_tx }}
    steps:
      - uses: actions/checkout@v6
      - name: Download prior Gate manifest
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.resume_run_id }}
          pattern: release-gate-manifest-${{ inputs.resume_run_id }}-${{ inputs.resume_run_attempt }}
          path: .prior-manifest
          merge-multiple: true
      - name: Download prior Reject recovery pointer
        uses: actions/download-artifact@v5
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.resume_run_id }}
          pattern: release-gate-reject-${{ inputs.resume_run_id }}-${{ inputs.resume_run_attempt }}
          path: .prior-reject
          merge-multiple: true
      - name: Validate the exact Reject checkpoint and recover the verified Approve
        id: resume
        run: |
          node .github/scripts/validate-release-resume.mjs \
            --manifest .prior-manifest/release-manifest.json \
            --recovery .prior-reject/release-evidence/reject.recovery.json \
            --source-run '${{ inputs.resume_run_id }}' \
            --output recovered-evidence/approve.json \
            --summary recovered-evidence/resume.json \
            --github-output "$GITHUB_OUTPUT"
      - name: Upload recovered Approve evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-approve-${{ github.run_id }}-${{ github.run_attempt }}
          path: recovered-evidence
          if-no-files-found: error
          retention-days: 90

  live_reject:
    name: Live Sepolia · Reject
    needs: [live_approve, recover_approve]
    if: ${{ always() && (needs.live_approve.result == 'success' || needs.recover_approve.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npx playwright install --with-deps chromium
        working-directory: app
      - name: Resolve tested UI SHA
        id: ui
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Execute one real Reject path
        timeout-minutes: 15
        working-directory: app
        env:
          VEILGUARD_LIVE_E2E: '1'
          VEILGUARD_LIVE_ACTION: reject
          VEILGUARD_EXPECTED_UI_SHA: ${{ steps.ui.outputs.sha }}
          VEILGUARD_SOURCE_COMMIT: ${{ github.sha }}
          VEILGUARD_LIVE_EVIDENCE_PATH: release-evidence/reject.json
          VEILGUARD_RECOVERY_MODE: ${{ needs.recover_approve.outputs.reject_mode }}
          VEILGUARD_RECOVERY_RUN_ID: ${{ needs.recover_approve.outputs.reject_run_id }}
          VEILGUARD_RECOVERY_REQUEST_ID: ${{ needs.recover_approve.outputs.reject_request_id }}
          VEILGUARD_RECOVERY_REQUEST_TX: ${{ needs.recover_approve.outputs.reject_request_tx }}
        run: npx playwright test --project=live-sepolia
      - name: Upload Reject evidence and trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-reject-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            app/release-evidence/reject*.json
            app/test-results
            app/playwright-report
          if-no-files-found: warn
          retention-days: 90

  manifest:
    name: Release evidence manifest
    if: always()
    needs: [confirmation, contract_tests, live_approve, recover_approve, live_reject]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Download action evidence
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          pattern: release-gate-*-${{ github.run_id }}-${{ github.run_attempt }}
          path: .release-artifacts
      - name: Validate and summarize both V1 evidence files
        env:
          RELEASE_CONFIRMATION_RESULT: ${{ needs.confirmation.result }}
          RELEASE_NOX_RESULT: ${{ needs.contract_tests.result }}
          RELEASE_APPROVE_RESULT: ${{ needs.live_approve.result == 'success' && 'success' || needs.recover_approve.result }}
          RELEASE_REJECT_RESULT: ${{ needs.live_reject.result }}
          RELEASE_RESUMED_FROM_RUN_ID: ${{ inputs.resume_run_id }}
        run: node .github/scripts/build-release-manifest.mjs --input .release-artifacts --output release-manifest.json
      - name: Upload release manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-manifest-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-manifest.json
          if-no-files-found: error
          retention-days: 90
